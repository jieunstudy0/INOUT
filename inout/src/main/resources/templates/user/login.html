<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 | 인아웃 시스템</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>INOUT SYSTEM</h2>
                <p>서비스 이용을 위해 로그인이 필요합니다.</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@jstudy.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn">로그인</button>
            </form>
            
            <div class="login-footer">
                <a href="/user/register">회원가입</a> | <a href="/user/find">비밀번호 찾기</a>
            </div>
        </div>
    </div> <script th:src="@{/js/login.js}"></script>
</body>
</html>
