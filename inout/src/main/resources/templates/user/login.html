<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 | 인아웃 시스템</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>INOUT SYSTEM</h2>
                <p>서비스 이용을 위해 로그인이 필요합니다.</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@jstudy.com" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" id="togglePasswordBtn" class="password-toggle-btn" aria-label="비밀번호 표시 전환">
                            보기
                        </button>
                    </div>
                    <div id="capsLockMessage" class="hint-message" style="display: none;">
                        Caps Lock이 켜져 있습니다.
                    </div>
                </div>

                <div class="option-row">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberEmail">
                        이메일 기억하기
                    </label>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="login-btn" id="loginBtn">로그인</button>
            </form>

            <div class="login-footer">
                <a th:href="@{/user/register}">회원가입</a> |
                <a th:href="@{/user/find}">이메일 찾기</a> |
                <a th:href="@{/user/public/password/reset}">비밀번호 찾기</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
